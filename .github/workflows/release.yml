name: Build and Release

on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt5 eng_to_ipa svgwrite

    - name: Build with PyInstaller
      run: pyinstaller LyricsToIPA.spec

    - name: Zip Mac App
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        zip -r LyricsToIPA-Mac.zip LyricsToIPA.app

    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.exe
          dist/LyricsToIPA
          dist/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}